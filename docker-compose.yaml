services:

  # ── PostgreSQL ────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: contact_diary_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-contact_diary_db}
      POSTGRES_USER: ${DB_USER:-diary_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-strongpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-diary_user} -d
            ${DB_NAME:-contact_diary_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: contact_diary_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django (Gunicorn) ─────────────────────────────────────
  web:
    build: .
    container_name: contact_diary_web
    restart: unless-stopped
    entrypoint: /app/entrypoint.sh
    env_file: .env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import socket; s=socket.socket();
            s.connect(('localhost', 8000)); s.close()\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Celery Worker ─────────────────────────────────────────
  celery_worker:
    build: .
    container_name: contact_diary_celery_worker
    restart: unless-stopped
    command: celery -A core worker --loglevel=info
    env_file: .env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      web:
        condition: service_healthy

  # ── Celery Beat (Scheduler) ───────────────────────────────
  celery_beat:
    build: .
    container_name: contact_diary_celery_beat
    restart: unless-stopped
    command: celery -A core beat --loglevel=info --scheduler
      django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      web:
        condition: service_healthy

  # ── Nginx ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: contact_diary_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      web:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
